name: milimani_app
description: Milimani Beach Resort - Lake Victoria, Kisumu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Animations
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # State & Navigation
  go_router: ^13.0.0
  provider: ^6.1.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true                    # enables l10n code generation

  assets:
    - assets/images/
    - assets/logo/


